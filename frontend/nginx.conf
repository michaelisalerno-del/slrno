server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /health {
    proxy_pass http://backend:8000/health;
  }

  location /settings/ {
    proxy_pass http://backend:8000/settings/;
  }

  location /markets {
    proxy_pass http://backend:8000;
  }

  location /market-plugins {
    proxy_pass http://backend:8000;
  }

  location /market-data {
    proxy_pass http://backend:8000;
  }

  location /ig {
    proxy_pass http://backend:8000;
  }

  location /research {
    proxy_pass http://backend:8000;
  }

  location /cockpit {
    proxy_pass http://backend:8000;
  }

  location /backtests {
    proxy_pass http://backend:8000;
  }

  location /templates {
    proxy_pass http://backend:8000;
  }

  location /paper {
    proxy_pass http://backend:8000;
  }

  location /broker {
    proxy_pass http://backend:8000;
  }

  location /risk {
    proxy_pass http://backend:8000;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
