services:
  backend:
    build:
      context: ./backend
    environment:
      SLRNO_HOME: ${SLRNO_HOME:-/data}
      SLRNO_ALLOWED_ORIGINS: ${SLRNO_ALLOWED_ORIGINS:-http://localhost:8080}
    volumes:
      - slrno-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  slrno-data:
